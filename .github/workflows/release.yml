name: Release

# On a v* tag: build the `presidio` CLI for each platform and attach the
# archives to the GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest, target: x86_64-apple-darwin, ext: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p presidio-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/presidio${{ matrix.ext }}"
          name="presidio-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "$bin" "dist/$name/"
          cp README.md LICENSE "dist/$name/" 2>/dev/null || true
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$name.zip" "$name" >/dev/null
          else
            tar czf "$name.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
