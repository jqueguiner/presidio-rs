name: PyPI

# Builds abi3 wheels + sdist for the `presidio-rs` Python package and publishes
# to PyPI when a GitHub Release is published (or a v* tag is pushed).
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token required.

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: wheels-${{ matrix.platform.target }}-${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-latest, target: x86_64 }
          - { os: macos-latest, target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # abi3 wheel -> one wheel per platform works for all Python >= 3.8
          args: --release --out dist --manifest-path bindings/python/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist
          if-no-files-found: error

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      # Trusted Publishing (OIDC) — bootstraps the first publish with no token.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
